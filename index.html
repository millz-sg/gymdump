<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const STORAGE_KEY = "gymdump-data-v2";
const SESSION_STATE_KEY = "gymdump-active-sessions";
const uid = () => Math.random().toString(36).slice(2, 9);
const DEFAULT_RULE = { weightIncrement: 5, targetSets: 3, targetReps: 8, sessionsBeforeNudge: 2 };
const mkEx = (name, sets, reps, tw, inc, nudge, notes = "") => ({
  id: uid(), name, defaultSets: sets, defaultReps: reps, targetWeight: tw, notes,

    { id: "w2s2", name: "Lower", exercises: [

      mkEx("Leg Extension",3,15,150,5,2,""), mkEx("Calf Raises",3,10,50,5,3,"seated or standing / 2 plate + 10"),
      mkEx("RDL or HA",3,10,65,5,2,"slow tempo"), mkEx("Hack Squat",3,8,55,10,2,"1 plate + 10"),
      mkEx("Hip Adduction",3,10,110,5,3,"machine") ]},
    { id: "w2s3", name: "Upper 2", exercises: [

      mkEx("Lateral Raises",3,15,12,2.5,3,"7.5+3 cable / rack 10s / 12 cybex"), mkEx("Preacher Curl Machine",3,10,75,5,2,""),
      mkEx("DB Bench Flat / Dips",3,10,75,5,2,"or dips") ]}
  ]}
]}, logs: [], completedSessions: {}, settings: { progressionTracking: true } };

function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); if (!r) return null; const d = JSON.parse(r); if (!d.completedSessions) d.completedSessions = {}; if (!d.settings) d.settings = { progressionTracking: true }; if (d.settings.progressionTracking === undefined) d.settings.progressionTracking = true; return d; } catch { return null; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) { console.error(e); } }
function getExerciseHistory(name, logs) {
  const e = [];
  for (const l of logs) for (const x of l.exercises)
    if (x.name.toLowerCase() === name.toLowerCase() && !x.skipped)
      e.push({ date: l.date, sessionName: l.sessionName, sets: x.sets, feeling: x.feeling, logId: l.id });
  return e.sort((a, b) => new Date(b.date) - new Date(a.date));
}
function getLastPerformance(n, l) { const h = getExerciseHistory(n, l); return h.length > 0 ? h[0] : null; }
function getProgressionNudge(name, logs, rule) {
  const r = { ...DEFAULT_RULE, ...rule }; if (r.weightIncrement === 0) return null;
  const h = getExerciseHistory(name, logs); if (h.length < r.sessionsBeforeNudge) return null;
  const rc = h.slice(0, r.sessionsBeforeNudge); const w = rc[0].sets[0]?.weight; if (!w) return null;
  if (rc.every(x => x.sets.length >= r.targetSets && x.sets.every(s => s.weight === w && s.reps >= r.targetReps)))
    return { current: w, suggested: w + r.weightIncrement, sessions: r.sessionsBeforeNudge };
  return null;
}
function formatDate(d) { return new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
function fmtW(w) { return w === 0 ? "BW" : w; }
function today() { return new Date().toISOString().split("T")[0]; }
function getWeekStreak(logs) {
  if (!logs.length) return 0; const now = new Date();
  const gw = d => { const dt = new Date(d + "T12:00:00"); const y = dt.getFullYear(); const s = new Date(y, 0, 1); return y * 100 + Math.floor(((dt - s) / 864e5 + s.getDay()) / 7); };
  const ws = new Set(logs.map(l => gw(l.date))); let s = 0;
  for (let i = 0; i < 200; i++) { const d = new Date(now); d.setDate(d.getDate() - i * 7); if (ws.has(gw(d.toISOString().split("T")[0]))) s++; else break; }
  return s;
}
function getVolume(wl) { let t = 0; Object.values(wl).forEach(v => { if (v.sets) v.sets.forEach(s => { t += s.weight * s.reps; }); }); return t; }

// ── UI Components ──
const Btn = ({ children, onClick, variant = "primary", className = "", ...rest }) => {

  return <button onClick={onClick} className={"font-semibold rounded-xl transition-all active:scale-95 " + v[variant] + " " + className} {...rest}>{children}</button>;
};
const Card = ({ children, className = "", onClick, ...rest }) => (
  <div onClick={onClick} {...rest} className={"bg-neutral-900 rounded-2xl p-4 " + (onClick ? "cursor-pointer active:bg-neutral-800 " : "") + className}>{children}</div>
);
const Header = ({ title, onBack, right }) => (

    <div className="flex items-center gap-3 min-w-0 flex-1">
      {onBack && <button onClick={onBack} className="text-neutral-400 text-2xl leading-none active:text-white p-1 flex-shrink-0">‹</button>}

    </div>
    {right && <div className="flex-shrink-0 ml-2">{right}</div>}
  </div>
);
const FeelingPicker = ({ value, onChange }) => {
  const opts = [
    { key: "weak", label: "Weak", icon: "↓", color: "text-red-400 bg-red-500/15 border-red-500/30" },
    { key: "normal", label: "Normal", icon: "—", color: "text-neutral-300 bg-neutral-700 border-neutral-600" },
    { key: "strong", label: "Strong", icon: "↑", color: "text-emerald-400 bg-emerald-500/15 border-emerald-500/30" }
  ];
  return (<div className="flex gap-2">{opts.map(o => (
    <button key={o.key} onClick={() => onChange(o.key)}
      className={"flex-1 py-2.5 rounded-xl text-sm font-medium border transition-all " + (value === o.key ? o.color : "text-neutral-500 bg-neutral-800/50 border-neutral-800")}>{o.icon} {o.label}</button>
  ))}</div>);
};
const Notes = ({ text }) => text ? <p className="text-neutral-600 text-xs mt-0.5 italic">{text}</p> : null;
const TargetBadge = ({ ex }) => {
  if (!ex.targetWeight || ex.targetWeight === 0) return null;
  return (<div className="flex items-center gap-1.5 mt-1"><span className="text-emerald-500 text-xs font-semibold">TARGET</span><span className="text-emerald-400 text-sm font-mono font-medium">{ex.targetWeight}lbs x {ex.defaultSets}x{ex.defaultReps}</span></div>);
};
const LastPerf = ({ last }) => {
  if (!last) return null;
  return (<div className="flex items-center gap-1.5 mt-1"><span className="text-neutral-500 text-xs font-semibold">LAST</span><span className="text-neutral-400 text-xs font-mono">{last.sets.map(s => fmtW(s.weight) + "x" + s.reps).join(", ")}{last.feeling !== "normal" && <span className={last.feeling === "strong" ? "text-emerald-500" : "text-red-400"}> ({last.feeling})</span>}</span><span className="text-neutral-600 text-xs">- {formatDate(last.date)}</span></div>);
};

// ── Swipe-to-Skip Card ──
const SwipeCard = ({ children, onSkip, className = "" }) => {
  const ref = useRef(null);
  const startX = useRef(0);
  const currentX = useRef(0);
  const swiped = useRef(false);

  const onTouchStart = e => { startX.current = e.touches[0].clientX; swiped.current = false; };
  const onTouchMove = e => {
    const dx = e.touches[0].clientX - startX.current;
    const clamped = Math.max(-80, Math.min(0, dx));
    currentX.current = clamped;
    if (ref.current) ref.current.style.transform = "translateX(" + clamped + "px)";
    if (clamped < -20) swiped.current = true;
  };
  const onTouchEnd = () => {
    if (currentX.current < -40) {
      if (ref.current) ref.current.style.transform = "translateX(-80px)";
    } else {
      if (ref.current) ref.current.style.transform = "translateX(0)";
    }
  };
  const resetSwipe = () => { if (ref.current) ref.current.style.transform = "translateX(0)"; };

  return (
    <div className="swipe-container">
      <div className="swipe-bg" onClick={() => { onSkip(); resetSwipe(); }}>
        <span className="text-white text-sm font-semibold">Skip</span>
      </div>
      <div ref={ref} className={"swipe-content p-4 " + className}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        onClick={e => { if (swiped.current) { e.stopPropagation(); return; } }}>
        {children}
      </div>
    </div>
  );
};

// ── Modal ──
const Modal = ({ title, children, onClose }) => (

// ── Rest Timer (receives state from parent) ──
const RestTimer = ({ seconds, running, onToggle, onReset }) => {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  const display = (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
  return (
    <div className="flex items-center justify-between">
      <div>
        <p className="text-neutral-500 text-xs uppercase tracking-widest mb-1">Rest Timer</p>
        <p className={"font-mono text-2xl font-bold " + (running ? "text-emerald-400" : seconds > 0 ? "text-white" : "text-neutral-500")}>{display}</p>

// ── Chart ──
const ProgressionChart = ({ history, targetWeight }) => {
  const [range, setRange] = useState("3mo");
  const filterByRange = h => { if (range === "all") return h; const c = new Date(); if (range === "1mo") c.setMonth(c.getMonth() - 1); if (range === "3mo") c.setMonth(c.getMonth() - 3); return h.filter(x => new Date(x.date + "T12:00:00") >= c); };
  if (history.length < 2) return null;
  const f = filterByRange([...history].reverse()); if (f.length < 2) return null;
  const pts = f.map(h => ({ date: h.date, weight: Math.max(...h.sets.map(s => s.weight)) }));
  const ws = pts.map(p => p.weight); const av = targetWeight > 0 ? [...ws, targetWeight] : ws;
  const mn = Math.min(...av) - 5, mx = Math.max(...av) + 5, rw = mx - mn || 1;
  const W = 320, H = 160, pL = 40, pR = 12, pT = 12, pB = 28, cW = W - pL - pR, cH = H - pT - pB;
  const gX = i => pL + (i / (pts.length - 1)) * cW, gY = v => pT + cH - ((v - mn) / rw) * cH;
  const lp = pts.map((p, i) => (i === 0 ? "M" : "L") + gX(i).toFixed(1) + "," + gY(p.weight).toFixed(1)).join(" ");
  const ap = lp + " L" + gX(pts.length - 1).toFixed(1) + "," + (pT + cH).toFixed(1) + " L" + pL + "," + (pT + cH).toFixed(1) + " Z";
  const yt = []; const st = rw <= 20 ? 5 : rw <= 50 ? 10 : 25;
  for (let v = Math.ceil(mn / st) * st; v <= mx; v += st) yt.push(v);
  return (<div className="mb-4"><div className="flex items-center justify-between mb-2 px-1"><p className="text-xs font-bold text-neutral-500 uppercase tracking-widest">Progression</p><div className="flex gap-1">{[{key:"1mo",label:"1M"},{key:"3mo",label:"3M"},{key:"all",label:"All"}].map(r => (<button key={r.key} onClick={() => setRange(r.key)} className={"px-2.5 py-1 rounded-lg text-xs font-medium transition-all " + (range === r.key ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>{r.label}</button>))}</div></div><Card><svg viewBox={"0 0 "+W+" "+H} width="100%" style={{display:"block"}}>{yt.map(v=>(<g key={v}><line x1={pL} y1={gY(v)} x2={W-pR} y2={gY(v)} stroke="#2a2a2a" strokeWidth="0.5"/><text x={pL-6} y={gY(v)+3.5} fill="#525252" fontSize="9" fontFamily="ui-monospace,monospace" textAnchor="end">{v}</text></g>))}{targetWeight>0&&<g><line x1={pL} y1={gY(targetWeight)} x2={W-pR} y2={gY(targetWeight)} stroke="#10b981" strokeWidth="1" strokeDasharray="5,4" opacity="0.4"/></g>}<path d={ap} fill="url(#cg)"/><path d={lp} fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>{pts.map((p,i)=>(<g key={i}><circle cx={gX(i)} cy={gY(p.weight)} r="3.5" fill="#10b981"/><circle cx={gX(i)} cy={gY(p.weight)} r="2" fill="#0a0a0a"/><text x={gX(i)} y={H-6} fill="#525252" fontSize="8" fontFamily="ui-monospace,monospace" textAnchor="middle">{formatDate(p.date).replace(" ","\u00A0")}</text></g>))}<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" stopOpacity="0.2"/><stop offset="100%" stopColor="#10b981" stopOpacity="0"/></linearGradient></defs></svg></Card></div>);
};

    { name: "ice cream truck", lbs: 30000, emoji: "🍦" },
    { name: "whale shark", lbs: 40000, emoji: "🦈" },
    { name: "roller coaster car", lbs: 50000, emoji: "🎢" },
    { name: "Mars rover", lbs: 60000, emoji: "🛰️" },
    { name: "container ship anchor", lbs: 70000, emoji: "⚓" },
    { name: "humpback whale", lbs: 80000, emoji: "🐋" },
    { name: "house of pancakes", lbs: 100000, emoji: "🥞", plural: "houses of pancakes" },
    { name: "UFO", lbs: 130000, emoji: "🛸" },
    { name: "space shuttle", lbs: 165000, emoji: "🚀" },
    { name: "blue whale", lbs: 300000, emoji: "🐳" },
    { name: "Statue of Liberty", lbs: 450000, emoji: "🗽", plural: "Statues of Liberty" },
  ];
  // Filter to items that give a count between 1 and 99999
  const viable = items.filter(item => { const c = Math.round(lbs / item.lbs); return c >= 1 && c <= 99999; });
  if (viable.length === 0) return null;
  // Seeded random pick - consistent for same seed
  const s = seed || 0;
  const hash = Math.abs(((s * 2654435761) >>> 0) % viable.length);
  const best = viable[hash];
  const count = Math.round(lbs / best.lbs);
  const plural = count !== 1;
  const name = plural && best.plural ? best.plural : plural ? best.name + "s" : best.name;
  return { text: count + " " + name, emoji: best.emoji };
}

  // ── HISTORY + EXERCISE HISTORY ──
  const HistoryView = () => {

        </div>))}

  // ── WORKOUT SESSION ──
  const WorkoutView = () => {
    const session = getSession(activeWeekId, activeSessionId);
    const isQuickSession = !session && tempExercises;
    if (!session && !isQuickSession) return null;
    const exercises = tempExercises || session.exercises;
    const sessName = isQuickSession ? (quickSessionName || "Quick Session") : session.name;
    const volume = getVolume(workoutLog);
    const loggedCount = Object.values(workoutLog).filter(v => v.sets?.length > 0).length;
    const doneCount = Object.values(doneExercises).filter(Boolean).length;
    const skippedCount = Object.values(skippedExercises).filter(Boolean).length;

    const completeSession = () => {
      const exList = exercises.map(ex => {
        if (skippedExercises[ex.id]) return { name: ex.name, skipped: true };
        if (workoutLog[ex.id]?.sets?.length > 0) return { name: ex.name, sets: workoutLog[ex.id].sets, feeling: workoutLog[ex.id].feeling || "normal" };
        return null;
      }).filter(Boolean);
      const nc = isQuickSession ? data.completedSessions : { ...data.completedSessions, [activeSessionId]: today() };
      const baseLogs = continuingLogId ? data.logs.filter(l => l.id !== continuingLogId) : data.logs;
      let newData;
      if (exList.length === 0) { newData = { ...data, logs: baseLogs, completedSessions: nc }; }
      else { newData = { ...data, logs: [...baseLogs, { id: uid(), date: today(), weekId: activeWeekId, sessionId: activeSessionId, sessionName: sessName, exercises: exList }], completedSessions: nc }; }
      save(newData);
      setContinuingLogId(null);
      delete sessionStatesRef.current[activeSessionId];
      setWorkoutLog({}); setSkippedExercises({}); setDoneExercises({});
      setActiveSessionId(null); setActiveWeekId(null); setTempExercises(null);
      setView("home");
    };
    const addTempWorkout = () => { const nm = newWorkoutRef.current?.value; if (!nm || !nm.trim()) return; setTempExercises([...(tempExercises || session?.exercises || []), mkEx(nm.trim(), 3, 10, 0, 5, 2, "")]); if (newWorkoutRef.current) newWorkoutRef.current.value = ""; setShowAddWorkout(false); };

    const goBack = () => {
      if (continuingLogId) {
        save({ ...data, completedSessions: { ...data.completedSessions, [activeSessionId]: today() } });
        setContinuingLogId(null);
        delete sessionStatesRef.current[activeSessionId];
      } else {
        saveCurrentSessionState();

      setView("home");

    return (<div>
      <Header title={sessName} onBack={goBack} />

      {/* Volume + Progress bar */}
      <div className="bg-neutral-900 rounded-2xl p-3 mb-4">
        <div className="flex items-center justify-between mb-2">
          <div><span className="text-neutral-500 text-xs">Volume</span><p className="text-white font-mono font-bold text-lg">{volume.toLocaleString()} <span className="text-neutral-500 text-sm font-normal">lbs</span></p></div>
          <div className="text-right"><span className="text-neutral-500 text-xs">Progress</span><p className="text-emerald-400 font-mono text-sm font-semibold">{doneCount + skippedCount} / {exercises.length}</p></div>
        </div>
        <div className="flex gap-1">{exercises.map((ex, i) => {
          const hasLog = !!(workoutLog[ex.id]?.sets?.length > 0);

      {/* Workout cards - swipeable */}
      <div>{exercises.map(ex => {
        const last = getLastPerformance(ex.name, data.logs);

        const isSkipped = !!skippedExercises[ex.id];
        const isLogged = logged.length > 0;
        const isDone = !!doneExercises[ex.id];
        const isInProgress = isLogged && !isDone;
        const lastLogForEx = [...data.logs].reverse().find(l => l.exercises.some(e => e.name === ex.name));

  // ── LOG EXERCISE ──
  const LogExerciseView = () => {

    const exDef = exercises.find(e => e.name === activeExName);

    const allDone = logged.length >= targetSets;

    const [eiInc, setEiInc] = useState(String(exDef.progressionRule?.weightIncrement || 5));
    const [eiSets, setEiSets] = useState(String(exDef.progressionRule?.targetSets || 3));
    const [eiReps, setEiReps] = useState(String(exDef.progressionRule?.targetReps || 8));
    const [eiNudge, setEiNudge] = useState(String(exDef.progressionRule?.sessionsBeforeNudge || 2));

    const saveWorkoutInfo = () => {
      const nr = { weightIncrement: parseFloat(eiInc) || 5, targetSets: parseInt(eiSets) || 3, targetReps: parseInt(eiReps) || 8, sessionsBeforeNudge: parseInt(eiNudge) || 2 };
      const oldName = exDef.name;
      const newName = eiName.trim() || oldName;
      const tw = eiTarget === "BW" ? "BW" : (parseFloat(eiTarget) || 0);
      const updatedFields = { name: newName, targetWeight: tw, notes: eiNotes.trim(), defaultSets: nr.targetSets, defaultReps: nr.targetReps, progressionRule: nr };
      const weeks = data.program.weeks.map(w => ({ ...w, sessions: w.sessions.map(s => ({ ...s, exercises: s.exercises.map(e => e.name === oldName ? { ...e, ...updatedFields } : e) })) }));
      save({ ...data, program: { weeks } });
      if (tempExercises) {
        setTempExercises(tempExercises.map(e => e.name === oldName ? { ...e, ...updatedFields } : e));
      }
      if (newName !== oldName) setActiveExName(newName);
      setShowEditInfo(false);
    };
    useEffect(() => { if (weightRef.current) weightRef.current.value = String(prefillWeight); if (repsRef.current) repsRef.current.value = ""; }, [activeExName]);
    const preserveInputs = fn => { const cw = weightRef.current?.value || ""; const cr = repsRef.current?.value || ""; fn(); requestAnimationFrame(() => { if (weightRef.current) weightRef.current.value = cw; if (repsRef.current) repsRef.current.value = cr; }); };
    const addSet = () => { const raw = weightRef.current?.value; const isBW = raw && raw.toUpperCase().trim() === "BW"; const w = isBW ? 0 : parseFloat(raw); const r = parseInt(repsRef.current?.value); if ((!isBW && (isNaN(w) || w < 0)) || !r) return; const cw = weightRef.current?.value || ""; setWorkoutLog({ ...workoutLog, [exDef.id]: { ...workoutLog[exDef.id], sets: [...logged, { weight: w, reps: r }], feeling } }); requestAnimationFrame(() => { if (weightRef.current) weightRef.current.value = cw; if (repsRef.current) repsRef.current.value = ""; }); };
    const removeSet = idx => { preserveInputs(() => { setWorkoutLog({ ...workoutLog, [exDef.id]: { ...workoutLog[exDef.id], sets: logged.filter((_, i) => i !== idx), feeling } }); }); };
    const updateFeeling = f => { preserveInputs(() => { setWorkoutLog({ ...workoutLog, [exDef.id]: { ...workoutLog[exDef.id], sets: logged, feeling: f } }); }); };
    const fillWeight = w => { if (weightRef.current) weightRef.current.value = String(w); };
    const lastWeights = [...new Set(allHistory.flatMap(h => h.sets.map(s => s.weight)))].sort((a, b) => b - a).slice(0, 3);
    const setLabel = allDone ? "Bonus Set " + currentSetNum : "Set " + currentSetNum + " of " + targetSets;

    return (<div>
      <Header title={activeExName} onBack={() => setView("workout")} right={<Btn variant="ghost" onClick={() => setShowEditInfo(!showEditInfo)} className="text-xs">{showEditInfo ? "Done" : "Settings"}</Btn>} />

      {showEditInfo && (<Card className="mb-3 border border-emerald-500/20">
        <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-3">Workout Settings</p>

          <div><label className="text-neutral-500 text-xs block mb-1">Workout Name</label><input value={eiName} onChange={e => setEiName(e.target.value)} className="w-full bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div><label className="text-emerald-500 text-xs block mb-1">Target Weight</label><div className="flex gap-2"><input type={eiTarget === "BW" ? "text" : "number"} inputMode={eiTarget === "BW" ? "text" : "decimal"} value={eiTarget} onChange={e => setEiTarget(e.target.value)} placeholder="e.g. 65" className="flex-1 bg-neutral-800 text-emerald-400 text-center font-mono rounded-xl py-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /><button onClick={() => setEiTarget(eiTarget === "BW" ? "" : "BW")} className={"px-3 py-2 rounded-xl text-xs font-semibold " + (eiTarget === "BW" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-400")}> BW</button></div></div>
          <div><label className="text-neutral-500 text-xs block mb-1">Setup Notes</label><input value={eiNotes} onChange={e => setEiNotes(e.target.value)} placeholder="Machine settings..." className="w-full bg-neutral-800 text-neutral-300 rounded-xl py-2.5 px-3 text-xs outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div className="flex items-center justify-between py-2">
            <div><p className="text-neutral-400 text-xs">Progression Nudges</p></div>
            <button onClick={() => { const oldName = exDef.name; const on = exDef.progressionEnabled !== false; const weeks = data.program.weeks.map(w => ({ ...w, sessions: w.sessions.map(s => ({ ...s, exercises: s.exercises.map(e => e.name === oldName ? { ...e, progressionEnabled: !on } : e) })) })); save({ ...data, program: { weeks } }); }}
              className={"w-12 h-7 rounded-full transition-all flex items-center " + (exDef.progressionEnabled !== false ? "bg-emerald-600 justify-end" : "bg-neutral-700 justify-start")}>
              <div className="w-5 h-5 bg-white rounded-full mx-1 shadow" />
            </button>
          </div>
          {exDef.progressionEnabled !== false && <div className="grid grid-cols-2 gap-2">

            <div><label className="text-neutral-500 text-xs block mb-1">After N sessions</label><input type="number" inputMode="numeric" value={eiNudge} onChange={e => setEiNudge(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
            <div><label className="text-neutral-500 text-xs block mb-1">Target sets</label><input type="number" inputMode="numeric" value={eiSets} onChange={e => setEiSets(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
            <div><label className="text-neutral-500 text-xs block mb-1">Target reps</label><input type="number" inputMode="numeric" value={eiReps} onChange={e => setEiReps(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          </div>}
          <Btn onClick={saveWorkoutInfo} className="w-full text-sm">Save Settings</Btn>
        </div>
      </Card>)}

      {/* Target + Last */}
      <div className="bg-neutral-900 rounded-2xl p-3 mb-3 space-y-1.5">
        {(exDef.targetWeight > 0 || exDef.targetWeight === "BW") && <div className="flex items-center justify-between"><span className="text-emerald-500 text-xs font-bold uppercase tracking-wider">Target</span><span className="text-emerald-400 text-sm font-mono font-semibold">{exDef.targetWeight === "BW" ? "Bodyweight" : exDef.targetWeight + "lbs"} x {exDef.defaultSets}x{exDef.defaultReps}</span></div>}
        {lastPerf && <div className="flex items-center justify-between"><span className="text-neutral-500 text-xs font-bold uppercase tracking-wider">Last</span><div className="text-right"><span className="text-neutral-400 text-xs font-mono">{lastPerf.sets.map(s => fmtW(s.weight)+"x"+s.reps).join(", ")}</span>{lastPerf.feeling !== "normal" && <span className={"text-xs ml-1 " + (lastPerf.feeling === "strong" ? "text-emerald-400" : "text-red-400")}>{lastPerf.feeling === "strong" ? "↑" : "↓"}</span>}<span className="text-neutral-600 text-xs ml-1.5">{formatDate(lastPerf.date)}</span></div></div>}
        {exDef.notes ? <Notes text={exDef.notes} /> : null}
      </div>
      {exDef.progressionEnabled !== false && nudge && <div className="bg-amber-500/10 border border-amber-500/25 rounded-2xl p-3 mb-3"><p className="text-amber-400 text-sm font-medium">↑ Hit {nudge.current}lbs for {nudge.sessions} sessions — try {nudge.suggested}lbs</p></div>}

      {/* Rest Timer */}
      <Card className="mb-3">
        <RestTimer seconds={timerSeconds} running={timerRunning} onToggle={() => setTimerRunning(!timerRunning)} onReset={() => { setTimerRunning(false); setTimerSeconds(0); }} />
      </Card>

      {/* Set logger */}
      <Card className="mb-4">
        <div className="flex items-center justify-between mb-3"><p className={"text-sm font-bold tracking-tight " + (allDone ? "text-emerald-400" : "text-white")}>{setLabel}</p>{allDone && <span className="text-emerald-400 text-xs">✓ Target hit</span>}</div>
        <div className="flex gap-1.5 mb-4">{Array.from({ length: Math.max(targetSets, logged.length + 1) }, (_, i) => (<div key={i} className={"h-1.5 flex-1 rounded-full " + (i < logged.length ? "bg-emerald-500" : i === logged.length ? "bg-neutral-600" : "bg-neutral-800")} />))}</div>
        <div className="flex gap-2 mb-3 flex-wrap">
          <button onClick={() => fillWeight("BW")} className="px-3 py-1.5 rounded-lg text-sm font-mono bg-neutral-800 text-neutral-400 active:bg-neutral-700">BW</button>
          {lastWeights.filter(w => w !== 0).map(w => (<button key={w} onClick={() => fillWeight(w)} className="px-3 py-1.5 rounded-lg text-sm font-mono bg-neutral-800 text-neutral-400 active:bg-neutral-700">{w}</button>))}
          {exDef.targetWeight > 0 && !lastWeights.includes(exDef.targetWeight) && <button onClick={() => fillWeight(exDef.targetWeight)} className="px-3 py-1.5 rounded-lg text-sm font-mono bg-emerald-900/40 text-emerald-400 active:bg-emerald-900/60 border border-emerald-500/30">{exDef.targetWeight}</button>}
        </div>
        <div className="flex gap-2 items-end"><div className="flex-1"><label className="text-neutral-500 text-xs mb-1 block">Weight</label><input type="text" inputMode="decimal" ref={weightRef} defaultValue={String(prefillWeight)} className="w-full bg-neutral-800 text-white text-center text-lg font-mono rounded-xl py-3 px-2 outline-none focus:ring-2 focus:ring-emerald-500/50" placeholder="lbs / BW" /></div><span className="text-neutral-600 text-lg pb-3">x</span><div className="flex-1"><label className="text-neutral-500 text-xs mb-1 block">Reps</label><input type="number" inputMode="numeric" ref={repsRef} defaultValue="" onKeyDown={e => { if (e.key === "Enter") addSet(); }} className="w-full bg-neutral-800 text-white text-center text-lg font-mono rounded-xl py-3 px-2 outline-none focus:ring-2 focus:ring-emerald-500/50" placeholder="#" /></div><Btn onClick={addSet} className="px-5 py-3 text-lg">+</Btn></div>
        {logged.length > 0 && <div className="mt-4 pt-3 border-t border-neutral-800">{logged.map((s, i) => (<div key={i} className="flex items-center justify-between py-2 border-b border-neutral-800 last:border-0"><span className="text-neutral-500 text-sm w-12">Set {i + 1}</span><span className="text-white font-mono font-medium text-base flex-1">{fmtW(s.weight)}<span className="text-neutral-500 text-sm">{s.weight === 0 ? "" : "lbs"}</span> x {s.reps}<span className="text-neutral-500 text-sm">reps</span></span><button onClick={() => removeSet(i)} className="text-neutral-600 text-lg px-2 active:text-red-400">x</button></div>))}</div>}
        <div className="mt-4 pt-3 border-t border-neutral-800"><p className="text-xs text-neutral-500 mb-2">How did it feel?</p><FeelingPicker value={feeling} onChange={updateFeeling} /></div>
      </Card>

      {logged.length > 0 && <Btn variant="primary" onClick={() => { setDoneExercises({ ...doneExercises, [exDef.id]: true }); setTimerRunning(false); setTimerSeconds(0); setView("workout"); }} className="w-full mb-4 py-4 text-base">Done</Btn>}

      <ProgressionChart history={allHistory} targetWeight={exDef.targetWeight || 0} />
      {history.length > 0 && (<div><p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2 px-1">History</p>{history.map((h, i) => (<div key={i} className="flex items-center justify-between py-2.5 border-b border-neutral-800/60 cursor-pointer active:bg-neutral-900" onClick={() => { setActiveLogId(h.logId); setView("logDetail"); }}><div><span className="text-neutral-400 text-sm">{formatDate(h.date)}</span><span className="text-neutral-600 text-xs ml-2">{h.sessionName}</span></div><div className="flex items-center gap-2"><span className="text-white text-sm font-mono">{h.sets.map(s => fmtW(s.weight)+"x"+s.reps).join(", ")}</span>{h.feeling !== "normal" && <span className={"text-xs " + (h.feeling === "strong" ? "text-emerald-400" : "text-red-400")}>{h.feeling === "strong" ? "↑" : "↓"}</span>}<span className="text-neutral-600">›</span></div></div>))}</div>)}
    </div>);
  };

  // ── LOG DETAIL ──
  const LogDetailView = () => {
    const log = data.logs.find(l => l.id === activeLogId);
    if (!log) { setView("home"); return null; }
    const [confirmDelete, setConfirmDelete] = useState(false);
    const [editingSet, setEditingSet] = useState(null);
    const [editW, setEditW] = useState("");
    const [editR, setEditR] = useState("");
    const deleteLog = () => { save({ ...data, logs: data.logs.filter(l => l.id !== activeLogId) }); setView("home"); };
    const deleteExercise = exIdx => { const ne = log.exercises.filter((_, i) => i !== exIdx); if (ne.length === 0) { deleteLog(); return; } save({ ...data, logs: data.logs.map(l => l.id === activeLogId ? { ...l, exercises: ne } : l) }); };
    const deleteSet = (exIdx, setIdx) => { const ns = log.exercises[exIdx].sets.filter((_, i) => i !== setIdx); if (ns.length === 0) { deleteExercise(exIdx); return; } const ne = log.exercises.map((ex, i) => i === exIdx ? { ...ex, sets: ns } : ex); save({ ...data, logs: data.logs.map(l => l.id === activeLogId ? { ...l, exercises: ne } : l) }); };
    const startEdit = (exIdx, setIdx) => { const s = log.exercises[exIdx].sets[setIdx]; setEditW(String(s.weight)); setEditR(String(s.reps)); setEditingSet({ exIdx, setIdx }); };
    const saveEdit = () => { if (!editingSet) return; const w = parseFloat(editW); const r = parseInt(editR); if (!w || !r) return; const { exIdx, setIdx } = editingSet; const ns = log.exercises[exIdx].sets.map((s, i) => i === setIdx ? { weight: w, reps: r } : s); const ne = log.exercises.map((ex, i) => i === exIdx ? { ...ex, sets: ns } : ex); save({ ...data, logs: data.logs.map(l => l.id === activeLogId ? { ...l, exercises: ne } : l) }); setEditingSet(null); };
    const updFeeling = (exIdx, f) => { const ne = log.exercises.map((ex, i) => i === exIdx ? { ...ex, feeling: f } : ex); save({ ...data, logs: data.logs.map(l => l.id === activeLogId ? { ...l, exercises: ne } : l) }); };

    const totalVol = log.exercises.filter(e => !e.skipped).reduce((a, e) => a + (e.sets || []).reduce((b, s) => b + s.weight * s.reps, 0), 0);

    return (<div>
      <Header title={log.sessionName} onBack={() => setView("home")} />
      <div className="bg-neutral-900 rounded-2xl p-3 mb-4">
        <div className="flex items-center justify-between">
          <span className="text-neutral-400 text-sm">{formatDate(log.date)}</span>
          <span className="text-neutral-500 text-xs">{log.exercises.filter(e => !e.skipped).length} workouts</span>
        </div>
        <div className="flex items-center justify-between mt-1">
          <span className="text-white font-mono text-sm">{totalVol.toLocaleString()} lbs total volume</span>
          <span className="text-neutral-500 text-xs">{log.exercises.filter(e => !e.skipped).reduce((a, e) => a + (e.sets?.length || 0), 0)} sets</span>
        </div>
      </div>
      {log.exercises.map((ex, exIdx) => {
        if (ex.skipped) return (<Card key={exIdx} className="mb-3 opacity-40"><p className="text-neutral-500 line-through text-sm">{ex.name}</p><p className="text-amber-600 text-xs">Skipped</p></Card>);
        return (<Card key={exIdx} className="mb-3">
          <div className="flex items-center justify-between mb-2"><p className="text-white font-semibold">{ex.name}</p><button onClick={() => deleteExercise(exIdx)} className="text-neutral-700 text-xs px-2 py-1 active:text-red-400">Remove</button></div>
          {ex.sets.map((s, setIdx) => {
            const isE = editingSet?.exIdx === exIdx && editingSet?.setIdx === setIdx;
            if (isE) return (<div key={setIdx} className="flex items-center gap-2 py-2 border-b border-neutral-800 last:border-0"><span className="text-neutral-500 text-sm w-12">Set {setIdx + 1}</span><input type="number" inputMode="decimal" value={editW} onChange={e => setEditW(e.target.value)} className="w-20 bg-neutral-800 text-white text-center text-sm font-mono rounded-lg py-2 outline-none focus:ring-2 focus:ring-emerald-500/50" /><span className="text-neutral-600 text-sm">x</span><input type="number" inputMode="numeric" value={editR} onChange={e => setEditR(e.target.value)} className="w-16 bg-neutral-800 text-white text-center text-sm font-mono rounded-lg py-2 outline-none focus:ring-2 focus:ring-emerald-500/50" /><button onClick={saveEdit} className="text-emerald-400 text-sm px-2 font-medium">Save</button><button onClick={() => setEditingSet(null)} className="text-neutral-600 text-sm px-1">x</button></div>);
            return (<div key={setIdx} className="flex items-center justify-between py-2 border-b border-neutral-800 last:border-0"><span className="text-neutral-500 text-sm w-12">Set {setIdx + 1}</span><span className="text-white font-mono text-sm flex-1 cursor-pointer active:text-emerald-400" onClick={() => startEdit(exIdx, setIdx)}>{fmtW(s.weight)}<span className="text-neutral-500 text-xs">{s.weight === 0 ? "" : "lbs"}</span> x {s.reps}<span className="text-neutral-500 text-xs">reps</span></span><button onClick={() => deleteSet(exIdx, setIdx)} className="text-neutral-700 text-lg px-2 active:text-red-400">x</button></div>);
          })}
          <div className="mt-2 pt-2 border-t border-neutral-800"><div className="flex gap-2">{["weak", "normal", "strong"].map(f => (<button key={f} onClick={() => updFeeling(exIdx, f)} className={"flex-1 py-1.5 rounded-lg text-xs font-medium border transition-all " + (ex.feeling === f ? (f === "weak" ? "text-red-400 bg-red-500/15 border-red-500/30" : f === "strong" ? "text-emerald-400 bg-emerald-500/15 border-emerald-500/30" : "text-neutral-300 bg-neutral-700 border-neutral-600") : "text-neutral-600 bg-neutral-800/50 border-neutral-800")}>{f === "weak" ? "↓" : f === "strong" ? "↑" : "-"} {f.charAt(0).toUpperCase() + f.slice(1)}</button>))}</div></div>
        </Card>);
      })}
      <div className="mt-6 pt-4 border-t border-neutral-800">{!confirmDelete ? (<button onClick={() => setConfirmDelete(true)} className="text-red-400/50 text-xs w-full text-center py-2">Delete this log</button>) : (<div className="text-center"><p className="text-red-400 text-xs mb-2">Delete this entire workout log?</p><div className="flex gap-2 justify-center"><Btn variant="danger" onClick={deleteLog} className="text-xs">Yes, delete</Btn><Btn variant="ghost" onClick={() => setConfirmDelete(false)} className="text-xs">Cancel</Btn></div></div>)}</div>
    </div>);
  };

  // ── PROGRAM ──
  const ProgramView = () => {
    const [showAddSession, setShowAddSession] = useState(null);
    const [addSessionMode, setAddSessionMode] = useState(null);
    const [newSessName, setNewSessName] = useState("");

    const addWeek = () => { save({ ...data, program: { ...data.program, weeks: [...data.program.weeks, { id: uid(), name: "Week " + (data.program.weeks.length + 1), sessions: [] }] } }); };
    const removeWeek = wid => {
      if (data.program.weeks.length <= 1) return;
      const newWeeks = data.program.weeks.filter(w => w.id !== wid).map((w, i) => {
        if (/^Week \d+$/.test(w.name)) return { ...w, name: "Week " + (i + 1) };
        return w;
      });
      save({ ...data, program: { ...data.program, weeks: newWeeks } });
    };
    const removeSession = (weekId, sessId) => {
      const weeks = data.program.weeks.map(w => w.id === weekId ? { ...w, sessions: w.sessions.filter(s => s.id !== sessId) } : w);
      save({ ...data, program: { weeks } });
    };
    const addBlankSession = (weekId) => {
      if (!newSessName.trim()) return;
      const sess = { id: uid(), name: newSessName.trim(), exercises: [] };
      const weeks = data.program.weeks.map(w => w.id === weekId ? { ...w, sessions: [...w.sessions, sess] } : w);
      save({ ...data, program: { weeks } });
      setNewSessName(""); setShowAddSession(null); setAddSessionMode(null);
    };
    const copySession = (weekId, sourceSess) => {
      const sess = { id: uid(), name: sourceSess.name + " (copy)", exercises: sourceSess.exercises.map(e => ({ ...e, id: uid() })) };
      const weeks = data.program.weeks.map(w => w.id === weekId ? { ...w, sessions: [...w.sessions, sess] } : w);
      save({ ...data, program: { weeks } });
      setShowAddSession(null); setAddSessionMode(null);
    };
    const addFromTemplate = (weekId, template) => {
      const sessions = template.sessions.map(name => ({ id: uid(), name, exercises: [] }));
      const weeks = data.program.weeks.map(w => w.id === weekId ? { ...w, sessions: [...w.sessions, ...sessions] } : w);
      save({ ...data, program: { weeks } });
      setShowAddSession(null); setAddSessionMode(null);
    };
    const allSessions = data.program.weeks.flatMap(w => w.sessions);
    const templates = [
      { name: "Upper / Lower / Upper", sessions: ["Upper 1", "Lower", "Upper 2"] },
      { name: "Push / Pull / Legs", sessions: ["Push", "Pull", "Legs"] },
      { name: "Full Body A / B", sessions: ["Full Body A", "Full Body B"] },
      { name: "Bro Split", sessions: ["Chest", "Back", "Shoulders", "Arms", "Legs"] },
    ];

    return (<div><Header title="Program" onBack={() => setView("home")} />
      {data.program.weeks.map((week, wi) => (<div key={week.id} className="mb-6">
        <div className="flex items-center justify-between px-1 mb-2"><input defaultValue={week.name} key={week.id + "-name"} onBlur={e => { const val = e.target.value.trim() || week.name; if (val !== week.name) { const weeks = data.program.weeks.map(w => w.id === week.id ? { ...w, name: val } : w); save({ ...data, program: { weeks } }); } }} className="text-xs font-bold text-neutral-500 uppercase tracking-widest bg-transparent outline-none flex-1 min-w-0 focus:text-white" />{data.program.weeks.length > 1 && <button onClick={() => removeWeek(week.id)} className="text-neutral-600 text-xs active:text-red-400 flex-shrink-0 ml-2">Remove</button>}</div>
        {week.sessions.map(sess => (<div key={sess.id} className="flex items-center gap-2 mb-2">
          <Card className="flex-1" onClick={() => { setEditWeekId(week.id); setEditSessionId(sess.id); setView("editSession"); }}><div className="flex items-center justify-between"><div><p className="text-white font-medium">{sess.name}</p><p className="text-neutral-500 text-xs">{sess.exercises.length} workouts</p></div><span className="text-neutral-600">›</span></div></Card>
          <button onClick={() => removeSession(week.id, sess.id)} className="text-neutral-700 text-sm px-2 py-4 active:text-red-400">x</button>
        </div>))}
        {showAddSession === week.id ? (
          <Card className="border border-dashed border-neutral-700 mt-2">
            {!addSessionMode && (<div className="space-y-2">
              <Btn variant="secondary" onClick={() => setAddSessionMode("blank")} className="w-full text-sm">Create Your Own</Btn>
              {allSessions.length > 0 && <Btn variant="secondary" onClick={() => setAddSessionMode("copy")} className="w-full text-sm">Copy Existing Session</Btn>}
              <Btn variant="secondary" onClick={() => setAddSessionMode("template")} className="w-full text-sm">Pre-Set Sessions</Btn>
              <button onClick={() => { setShowAddSession(null); setAddSessionMode(null); }} className="text-neutral-600 text-xs w-full text-center py-1">Cancel</button>
            </div>)}
            {addSessionMode === "blank" && (<div>
              <p className="text-xs text-neutral-500 mb-2">Session Name</p>
              <div className="flex gap-2"><input value={newSessName} onChange={e => setNewSessName(e.target.value)} placeholder="e.g. Upper 1" className="flex-1 bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /><Btn onClick={() => addBlankSession(week.id)} className="text-sm px-4 py-2">Add</Btn></div>
              <button onClick={() => setAddSessionMode(null)} className="text-neutral-500 text-xs w-full text-center py-2 mt-1 active:text-white">‹ Back</button>
            </div>)}
            {addSessionMode === "copy" && (<div>
              <p className="text-xs text-neutral-500 mb-2">Copy from:</p>
              <div className="space-y-1">{allSessions.map(s => (<button key={s.id} onClick={() => copySession(week.id, s)} className="w-full text-left bg-neutral-800 rounded-xl py-2.5 px-3 text-sm text-white active:bg-neutral-700">{s.name} ({s.exercises.length} workouts)</button>))}</div>
              <button onClick={() => setAddSessionMode(null)} className="text-neutral-500 text-xs w-full text-center py-2 mt-1 active:text-white">‹ Back</button>
            </div>)}
            {addSessionMode === "template" && (<div>
              <p className="text-xs text-neutral-500 mb-2">Add template sessions:</p>
              <div className="space-y-1">{templates.map(t => (<button key={t.name} onClick={() => addFromTemplate(week.id, t)} className="w-full text-left bg-neutral-800 rounded-xl py-2.5 px-3 text-sm text-white active:bg-neutral-700">{t.name}<span className="text-neutral-500 text-xs ml-2">{t.sessions.join(", ")}</span></button>))}</div>
              <button onClick={() => setAddSessionMode(null)} className="text-neutral-500 text-xs w-full text-center py-2 mt-1 active:text-white">‹ Back</button>
            </div>)}
          </Card>
        ) : (
          <button onClick={() => { setShowAddSession(week.id); setAddSessionMode(null); setNewSessName(""); }} className="w-full mt-1 py-2 text-neutral-500 text-sm text-center active:text-neutral-300 border border-dashed border-neutral-800 rounded-xl">+ Add Session</button>
        )}
      </div>))}
      <Btn variant="secondary" onClick={addWeek} className="w-full mt-2">+ Add Week</Btn>
      <div className="mt-8 pt-4 border-t border-neutral-800 space-y-3">
        <div className="flex gap-2 justify-center"><Btn variant="secondary" onClick={exportData} className="text-xs">Export Backup</Btn><Btn variant="secondary" onClick={importData} className="text-xs">Import Backup</Btn></div>
        {!confirmReset ? (<button onClick={() => setConfirmReset(true)} className="text-neutral-600 text-xs w-full text-center py-2">Reset to defaults</button>) : (<div className="text-center"><p className="text-red-400 text-xs mb-2">This will erase all logs and reset your program.</p><div className="flex gap-2 justify-center"><Btn variant="danger" onClick={resetToDefaults} className="text-xs">Yes, reset</Btn><Btn variant="ghost" onClick={() => setConfirmReset(false)} className="text-xs">Cancel</Btn></div></div>)}
      </div>
    </div>);
  };

  // ── QUICK SESSION SETUP ──
  const QuickSessionSetup = () => {
    const allExercises = getAllProgramExercises();
    const [newExName, setNewExName] = useState("");
    const [newExSets, setNewExSets] = useState("3");
    const [newExReps, setNewExReps] = useState("8");
    const [newExTarget, setNewExTarget] = useState("");
    const [newExNotes, setNewExNotes] = useState("");
    const [newExInc, setNewExInc] = useState("5");
    const [newExNudge, setNewExNudge] = useState("2");
    const [showSuggestions, setShowSuggestions] = useState(false);
    const suggestions = newExName.length >= 2 ? COMMON_EXERCISES.filter(e => e.toLowerCase().includes(newExName.toLowerCase()) && !quickSessionExercises.find(q => q.name === e)).slice(0, 6) : [];

    const addFromProgram = (ex) => {
      if (quickSessionExercises.find(q => q.name === ex.name)) return;
      setQuickSessionExercises([...quickSessionExercises, { ...ex, id: uid() }]);
    };
    const addNewExercise = () => {
      if (!newExName.trim()) return;
      if (quickSessionExercises.find(q => q.name === newExName.trim())) return;
      const ex = mkEx(newExName.trim(), parseInt(newExSets) || 3, parseInt(newExReps) || 8, newExTarget === "BW" ? "BW" : (parseFloat(newExTarget) || 0), parseFloat(newExInc) || 5, parseInt(newExNudge) || 2, newExNotes.trim());
      setQuickSessionExercises([...quickSessionExercises, ex]);
      setNewExName(""); setNewExNotes(""); setNewExTarget(""); setNewExSets("3"); setNewExReps("8"); setNewExInc("5"); setNewExNudge("2"); setShowSuggestions(false);
    };
    const removeExercise = (idx) => { setQuickSessionExercises(quickSessionExercises.filter((_, i) => i !== idx)); };

    return (<div>
      <Header title="Quick Session" onBack={() => setView("home")} />
      <Card className="mb-4">
        <p className="text-xs text-neutral-500 mb-1">Session Name</p>
        <input value={quickSessionName} onChange={e => setQuickSessionName(e.target.value)} placeholder="e.g. Extra Push Day" className="w-full bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" />
      </Card>

      {quickSessionExercises.length > 0 && (<div className="mb-4">
        <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2 px-1">Added ({quickSessionExercises.length})</p>
        {quickSessionExercises.map((ex, i) => (
          <div key={i} className="flex items-center justify-between bg-neutral-900 rounded-xl p-3 mb-1.5">
            <div><p className="text-white text-sm font-medium">{ex.name}</p><p className="text-neutral-500 text-xs">{ex.defaultSets}x{ex.defaultReps}{ex.targetWeight > 0 ? " @ " + ex.targetWeight + "lbs" : ex.targetWeight === "BW" ? " @ BW" : ""}</p></div>
            <button onClick={() => removeExercise(i)} className="text-neutral-600 px-2 active:text-red-400">x</button>
          </div>
        ))}
      </div>)}

      <div className="flex gap-1 mb-3">
        <button onClick={() => setQuickAddTab("my")} className={"flex-1 py-2 rounded-xl text-sm font-medium transition-all " + (quickAddTab === "my" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>My Workouts</button>
        <button onClick={() => setQuickAddTab("new")} className={"flex-1 py-2 rounded-xl text-sm font-medium transition-all " + (quickAddTab === "new" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>New Workout</button>
      </div>

      {quickAddTab === "my" && (<Card>
        {allExercises.length === 0 ? <p className="text-neutral-500 text-sm text-center py-4">No workouts in your program yet</p>
        : <div className="space-y-1">{allExercises.filter(e => !quickSessionExercises.find(q => q.name === e.name)).map(ex => (
          <button key={ex.name} onClick={() => addFromProgram(ex)}
            className="w-full text-left bg-neutral-800 rounded-xl py-2.5 px-3 active:bg-neutral-700">
            <p className="text-white text-sm">{ex.name}</p>
            <p className="text-neutral-500 text-xs">{ex.defaultSets}x{ex.defaultReps}{ex.targetWeight > 0 ? " @ " + ex.targetWeight + "lbs" : ex.targetWeight === "BW" ? " @ BW" : ""}{ex.notes ? " · " + ex.notes : ""}</p>
          </button>
        ))}</div>}
      </Card>)}

      {quickAddTab === "new" && (<Card>
        <div className="relative">
          <input value={newExName} onChange={e => { setNewExName(e.target.value); setShowSuggestions(true); }} onFocus={() => setShowSuggestions(true)} placeholder="Workout name (e.g. Lat Pulldown)" className="w-full bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none mb-1 focus:ring-2 focus:ring-emerald-500/50" />
          {showSuggestions && suggestions.length > 0 && (<div className="absolute left-0 right-0 top-full z-10 bg-neutral-800 rounded-xl border border-neutral-700 overflow-hidden mb-2">{suggestions.map(s => (<button key={s} onClick={() => { setNewExName(s); setShowSuggestions(false); }} className="w-full text-left px-3 py-2.5 text-sm text-white active:bg-neutral-700 border-b border-neutral-700/50 last:border-0">{s}</button>))}</div>)}
        </div>
        <div className="flex gap-2 mb-2 mt-1">
          <div className="flex-1"><label className="text-neutral-500 text-xs">Sets</label><input type="number" inputMode="numeric" value={newExSets} onChange={e => setNewExSets(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div className="flex-1"><label className="text-neutral-500 text-xs">Reps</label><input type="number" inputMode="numeric" value={newExReps} onChange={e => setNewExReps(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div className="flex-1"><label className="text-emerald-500 text-xs">Target</label><div className="flex gap-1"><input type={newExTarget === "BW" ? "text" : "number"} inputMode={newExTarget === "BW" ? "text" : "decimal"} value={newExTarget} onChange={e => setNewExTarget(e.target.value)} className="flex-1 min-w-0 bg-neutral-800 text-emerald-400 text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" placeholder="-" /><button type="button" onClick={() => setNewExTarget(newExTarget === "BW" ? "" : "BW")} className={"px-2 py-2 rounded-xl text-xs font-semibold " + (newExTarget === "BW" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>BW</button></div></div>
        </div>
        <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2 mt-3">Progression</p>
        <div className="flex gap-2 mb-2">
          <div className="flex-1"><label className="text-neutral-500 text-xs">Weight +</label><input type="number" inputMode="decimal" value={newExInc} onChange={e => setNewExInc(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div className="flex-1"><label className="text-neutral-500 text-xs">After N sessions</label><input type="number" inputMode="numeric" value={newExNudge} onChange={e => setNewExNudge(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
        </div>
        <input value={newExNotes} onChange={e => setNewExNotes(e.target.value)} placeholder="Setup notes (machine settings, grip, etc.)" className="w-full bg-neutral-800 text-neutral-300 rounded-xl py-2.5 px-3 text-xs outline-none mb-3 focus:ring-2 focus:ring-emerald-500/50" />
        <Btn onClick={addNewExercise} className="w-full">+ Add</Btn>
      </Card>)}

      {quickSessionExercises.length > 0 && (
        <Btn variant="primary" onClick={saveQuickSession} className="w-full mt-5 py-4 text-base">Save Session ({quickSessionExercises.length} exercises)</Btn>
      )}
    </div>);
  };

  // ── EDIT SESSION ──
  const EditSessionView = () => {
    const week = data.program.weeks.find(w => w.id === editWeekId);
    const session = week?.sessions.find(s => s.id === editSessionId); if (!session) return null;
    const [newExName, setNewExName] = useState("");
    const [newExSets, setNewExSets] = useState("3");
    const [newExReps, setNewExReps] = useState("8");
    const [newExTarget, setNewExTarget] = useState("");
    const [newExNotes, setNewExNotes] = useState("");
    const [newExInc, setNewExInc] = useState("5");
    const [newExNudge, setNewExNudge] = useState("2");
    const [showSuggestions, setShowSuggestions] = useState(false);
    const suggestions = newExName.length >= 2 ? COMMON_EXERCISES.filter(e => e.toLowerCase().includes(newExName.toLowerCase())).slice(0, 6) : [];

    const [editAddTab, setEditAddTab] = useState("new");
    const allProgramExercises = getAllProgramExercises();
    const addFromProgram = (ex) => {
      if (session.exercises.find(e => e.name === ex.name)) return;
      const newEx = { ...ex, id: uid() };
      const weeks = data.program.weeks.map(w => w.id === editWeekId ? { ...w, sessions: w.sessions.map(s => s.id === editSessionId ? { ...s, exercises: [...s.exercises, newEx] } : s) } : w);
      save({ ...data, program: { weeks } });
    };

    const addExercise = () => {
      if (!newExName.trim()) return;
      const ex = mkEx(newExName.trim(), parseInt(newExSets) || 3, parseInt(newExReps) || 8, newExTarget === "BW" ? "BW" : (parseFloat(newExTarget) || 0), parseFloat(newExInc) || 5, parseInt(newExNudge) || 2, newExNotes.trim());
      const weeks = data.program.weeks.map(w => w.id === editWeekId ? { ...w, sessions: w.sessions.map(s => s.id === editSessionId ? { ...s, exercises: [...s.exercises, ex] } : s) } : w);
      save({ ...data, program: { weeks } });
      setNewExName(""); setNewExNotes(""); setNewExTarget(""); setNewExSets("3"); setNewExReps("8"); setNewExInc("5"); setNewExNudge("2"); setShowSuggestions(false);
    };
    const removeExercise = exId => { const weeks = data.program.weeks.map(w => w.id === editWeekId ? { ...w, sessions: w.sessions.map(s => s.id === editSessionId ? { ...s, exercises: s.exercises.filter(e => e.id !== exId) } : s) } : w); save({ ...data, program: { weeks } }); };
    const moveExercise = (exId, dir) => { const exs = [...session.exercises]; const idx = exs.findIndex(e => e.id === exId); if ((dir === -1 && idx === 0) || (dir === 1 && idx === exs.length - 1)) return; [exs[idx], exs[idx + dir]] = [exs[idx + dir], exs[idx]]; const weeks = data.program.weeks.map(w => w.id === editWeekId ? { ...w, sessions: w.sessions.map(s => s.id === editSessionId ? { ...s, exercises: exs } : s) } : w); save({ ...data, program: { weeks } }); };
    return (<div><Header title={session.name} onBack={() => setView("program")} />
      <Card className="mb-4"><p className="text-xs text-neutral-500 mb-1">Session Name</p><input defaultValue={session.name} key={editSessionId + "-name"} onBlur={e => { const val = e.target.value.trim(); if (val && val !== session.name) { const weeks = data.program.weeks.map(w => w.id === editWeekId ? { ...w, sessions: w.sessions.map(s => s.id === editSessionId ? { ...s, name: val } : s) } : w); save({ ...data, program: { weeks } }); } }} className="w-full bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></Card>
      <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2 px-1">Workouts</p>
      {session.exercises.map(ex => (<Card key={ex.id} className="mb-2"><div className="flex items-center justify-between"><div className="flex-1 min-w-0" onClick={() => { setEditExercise(ex); setView("editExerciseDetail"); }}><p className="text-white font-medium truncate">{ex.name}</p><div className="flex items-center gap-2 mt-0.5"><span className="text-neutral-500 text-xs">{ex.defaultSets}x{ex.defaultReps}</span>{(ex.targetWeight > 0 || ex.targetWeight === "BW") && <span className="text-emerald-400 text-xs font-mono">-> {ex.targetWeight === "BW" ? "BW" : ex.targetWeight + "lbs"}</span>}</div><Notes text={ex.notes} /></div><div className="flex items-center gap-1 flex-shrink-0"><button onClick={() => moveExercise(ex.id, -1)} className="text-neutral-600 px-2 py-1 text-sm active:text-white">▲</button><button onClick={() => moveExercise(ex.id, 1)} className="text-neutral-600 px-2 py-1 text-sm active:text-white">▼</button><button onClick={() => removeExercise(ex.id)} className="text-neutral-600 px-2 py-1 active:text-red-400">x</button></div></div></Card>))}
      <Card className="mt-4 border border-dashed border-neutral-700">
        <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-3">Add Workout</p>
        <div className="flex gap-1 mb-3">
          <button onClick={() => setEditAddTab("my")} className={"flex-1 py-2 rounded-xl text-sm font-medium transition-all " + (editAddTab === "my" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>My Workouts</button>
          <button onClick={() => setEditAddTab("new")} className={"flex-1 py-2 rounded-xl text-sm font-medium transition-all " + (editAddTab === "new" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>New Workout</button>
        </div>
        {editAddTab === "my" && (<div>
          {allProgramExercises.filter(e => !session.exercises.find(s => s.name === e.name)).length === 0
            ? <p className="text-neutral-500 text-sm text-center py-4">All your workouts are already in this session</p>
            : <div className="space-y-1">{allProgramExercises.filter(e => !session.exercises.find(s => s.name === e.name)).map(ex => (
              <button key={ex.name} onClick={() => addFromProgram(ex)} className="w-full text-left bg-neutral-800 rounded-xl py-2.5 px-3 active:bg-neutral-700">
                <p className="text-white text-sm">{ex.name}</p>
                <p className="text-neutral-500 text-xs">{ex.defaultSets}x{ex.defaultReps}{ex.targetWeight > 0 ? " @ " + ex.targetWeight + "lbs" : ex.targetWeight === "BW" ? " @ BW" : ""}{ex.notes ? " · " + ex.notes : ""}</p>
              </button>
            ))}</div>}
        </div>)}
        {editAddTab === "new" && (<div>
          <div className="relative">
            <input value={newExName} onChange={e => { setNewExName(e.target.value); setShowSuggestions(true); }} onFocus={() => setShowSuggestions(true)} placeholder="Workout name (e.g. Lat Pulldown)" className="w-full bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none mb-1 focus:ring-2 focus:ring-emerald-500/50" />
            {showSuggestions && suggestions.length > 0 && (<div className="absolute left-0 right-0 top-full z-10 bg-neutral-800 rounded-xl border border-neutral-700 overflow-hidden mb-2">{suggestions.map(s => (<button key={s} onClick={() => { setNewExName(s); setShowSuggestions(false); }} className="w-full text-left px-3 py-2.5 text-sm text-white active:bg-neutral-700 border-b border-neutral-700/50 last:border-0">{s}</button>))}</div>)}
          </div>
          <div className="flex gap-2 mb-2 mt-1">
            <div className="flex-1"><label className="text-neutral-500 text-xs">Sets</label><input type="number" inputMode="numeric" value={newExSets} onChange={e => setNewExSets(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
            <div className="flex-1"><label className="text-neutral-500 text-xs">Reps</label><input type="number" inputMode="numeric" value={newExReps} onChange={e => setNewExReps(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
            <div className="flex-1"><label className="text-emerald-500 text-xs">Target</label><div className="flex gap-1"><input type={newExTarget === "BW" ? "text" : "number"} inputMode={newExTarget === "BW" ? "text" : "decimal"} value={newExTarget} onChange={e => setNewExTarget(e.target.value)} className="flex-1 min-w-0 bg-neutral-800 text-emerald-400 text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" placeholder="-" /><button type="button" onClick={() => setNewExTarget(newExTarget === "BW" ? "" : "BW")} className={"px-2 py-2 rounded-xl text-xs font-semibold " + (newExTarget === "BW" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-500")}>BW</button></div></div>
          </div>
          <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-2 mt-3">Progression</p>
          <div className="flex gap-2 mb-2">
            <div className="flex-1"><label className="text-neutral-500 text-xs">Weight +</label><input type="number" inputMode="decimal" value={newExInc} onChange={e => setNewExInc(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
            <div className="flex-1"><label className="text-neutral-500 text-xs">After N sessions</label><input type="number" inputMode="numeric" value={newExNudge} onChange={e => setNewExNudge(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          </div>
          <input value={newExNotes} onChange={e => setNewExNotes(e.target.value)} placeholder="Setup notes (machine settings, grip, etc.)" className="w-full bg-neutral-800 text-neutral-300 rounded-xl py-2.5 px-3 text-xs outline-none mb-3 focus:ring-2 focus:ring-emerald-500/50" />
          <Btn onClick={addExercise} className="w-full">+ Add</Btn>
        </div>)}
      </Card>
    </div>);
  };

  // ── EDIT EXERCISE DETAIL ──
  const EditExerciseDetailView = () => {
    if (!editExercise) return null;
    const [inc, setInc] = useState(String(editExercise.progressionRule?.weightIncrement || 5));
    const [tSets, setTSets] = useState(String(editExercise.progressionRule?.targetSets || 3));
    const [tReps, setTReps] = useState(String(editExercise.progressionRule?.targetReps || 8));
    const [sNudge, setSNudge] = useState(String(editExercise.progressionRule?.sessionsBeforeNudge || 2));
    const [exName, setExName] = useState(editExercise.name);
    const [exNotes, setExNotes] = useState(editExercise.notes || "");
    const [exTarget, setExTarget] = useState(editExercise.targetWeight === "BW" ? "BW" : String(editExercise.targetWeight || ""));
    const saveRule = () => {
      const rule = { weightIncrement: parseFloat(inc) || 5, targetSets: parseInt(tSets) || 3, targetReps: parseInt(tReps) || 8, sessionsBeforeNudge: parseInt(sNudge) || 2 };
      const oldName = editExercise.name;
      const newName = exName.trim() || oldName;
      const weeks = data.program.weeks.map(w => ({ ...w, sessions: w.sessions.map(s => ({ ...s, exercises: s.exercises.map(e => e.name === oldName ? { ...e, name: newName, notes: exNotes.trim(), targetWeight: exTarget === "BW" ? "BW" : (parseFloat(exTarget) || 0), defaultSets: rule.targetSets, defaultReps: rule.targetReps, progressionRule: rule } : e) })) }));
      save({ ...data, program: { weeks } }); setView("editSession");
    };
    return (<div><Header title="Edit Workout" onBack={() => setView("editSession")} />
      <Card className="space-y-4">
        <div><label className="text-neutral-500 text-xs block mb-1">Name</label><input value={exName} onChange={e => setExName(e.target.value)} className="w-full bg-neutral-800 text-white rounded-xl py-2.5 px-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
        <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3"><label className="text-emerald-500 text-xs font-bold uppercase tracking-wider block mb-1">Target Weight</label><div className="flex gap-2"><input type={exTarget === "BW" ? "text" : "number"} inputMode={exTarget === "BW" ? "text" : "decimal"} value={exTarget} onChange={e => setExTarget(e.target.value)} placeholder="e.g. 65" className="flex-1 bg-neutral-800 text-emerald-400 text-center text-lg font-mono rounded-xl py-2.5 px-3 outline-none focus:ring-2 focus:ring-emerald-500/50" /><button onClick={() => setExTarget(exTarget === "BW" ? "" : "BW")} className={"px-4 py-2 rounded-xl text-sm font-semibold " + (exTarget === "BW" ? "bg-emerald-600 text-white" : "bg-neutral-800 text-neutral-400")}>BW</button></div><p className="text-emerald-500/50 text-xs mt-1.5">{exTarget === "BW" ? "Bodyweight exercise" : "Update when you are ready to progress."}</p></div>
        <div><label className="text-neutral-500 text-xs block mb-1">Setup Notes</label><input value={exNotes} onChange={e => setExNotes(e.target.value)} placeholder="Machine settings, grip, position..." className="w-full bg-neutral-800 text-neutral-300 rounded-xl py-2.5 px-3 text-xs outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
        <p className="text-xs font-bold text-neutral-500 uppercase tracking-widest pt-2">Progression Rule</p>
        <div className="grid grid-cols-2 gap-3 mt-3">
          <div><label className="text-neutral-500 text-xs block mb-1">Weight +</label><input type="number" inputMode="decimal" value={inc} onChange={e => setInc(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div><label className="text-neutral-500 text-xs block mb-1">After N sessions</label><input type="number" inputMode="numeric" value={sNudge} onChange={e => setSNudge(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div><label className="text-neutral-500 text-xs block mb-1">Target sets</label><input type="number" inputMode="numeric" value={tSets} onChange={e => setTSets(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
          <div><label className="text-neutral-500 text-xs block mb-1">Target reps</label><input type="number" inputMode="numeric" value={tReps} onChange={e => setTReps(e.target.value)} className="w-full bg-neutral-800 text-white text-center rounded-xl py-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500/50" /></div>
        </div>
        <p className="text-neutral-600 text-xs mt-3">{parseFloat(inc) === 0 ? "No weight nudge (bodyweight)" : "Nudge +" + (inc || 5) + "lbs after hitting " + (tSets || 3) + "x" + (tReps || 8) + " for " + (sNudge || 2) + " sessions"}</p>
        <Btn onClick={saveRule} className="w-full">Save</Btn>
      </Card>
    </div>);
  };

  if (loading) return <div className="min-h-screen bg-neutral-950 flex items-center justify-center"><p className="text-neutral-500 text-sm">Loading...</p></div>;
  if (!data) return null;
  return (<div className="min-h-screen bg-neutral-950 text-white px-4 pb-8 pt-2" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif' }}>
    {view === "home" && <HomeView />}
    {view === "workout" && <WorkoutView />}
    {view === "logExercise" && <LogExerciseView />}
    {view === "quickSetup" && <QuickSessionSetup />}
    {view === "program" && <ProgramView />}
    {view === "editSession" && <EditSessionView />}
    {view === "editExerciseDetail" && <EditExerciseDetailView />}
    {view === "history" && <HistoryView />}
    {view === "exerciseHistory" && <ExerciseHistoryView />}
    {view === "logDetail" && <LogDetailView />}

    {/* Share Action Modal (from long-press) */}
    {shareAction && (<Modal title={shareAction.name} onClose={() => setShareAction(null)}>
      <div className="bg-neutral-800 rounded-xl p-3 space-y-1 max-h-40 overflow-y-auto mb-4">
        {shareAction.exercises.map((ex, i) => (
          <div key={i} className="flex items-center justify-between">
            <span className="text-neutral-300 text-xs">{ex.name}</span>
            <span className="text-neutral-500 text-xs font-mono">{ex.defaultSets}x{ex.defaultReps}</span>
          </div>
        ))}
      </div>
      <Btn variant="primary" onClick={() => { shareSession(shareAction.name, shareAction.exercises); setShareAction(null); }} className="w-full">Share Session</Btn>
    </Modal>)}

    {/* Share Import Modal */}
    {shareImport && (<Modal title="Shared Session" onClose={() => setShareImport(null)}>
      <div className="mb-4">
        <p className="text-white font-semibold text-sm mb-2">{shareImport.name}</p>
        <div className="bg-neutral-800 rounded-xl p-3 space-y-1 max-h-48 overflow-y-auto">
          {shareImport.exercises.map((ex, i) => (
            <div key={i} className="flex items-center justify-between">
              <span className="text-neutral-300 text-xs">{ex.name}</span>
              <span className="text-neutral-500 text-xs font-mono">{ex.defaultSets}x{ex.defaultReps}{ex.targetWeight > 0 ? " @ " + ex.targetWeight + "lbs" : ex.targetWeight === "BW" ? " @ BW" : ""}</span>
            </div>
          ))}
        </div>
        <p className="text-neutral-500 text-xs mt-2">{shareImport.exercises.length} exercises</p>
      </div>
      <div className="space-y-2">
        <Btn variant="primary" onClick={() => importAsTemp(shareImport)} className="w-full">Save as Shared Session</Btn>
        {data?.program?.weeks?.length > 0 && (<>
          <p className="text-neutral-500 text-xs text-center mt-3 mb-1">Or add to your program:</p>
          {data.program.weeks.map(w => (
            <Btn key={w.id} variant="secondary" onClick={() => importToProgram(shareImport, w.id)} className="w-full text-sm">{w.name}</Btn>
          ))}
        </>)}
      </div>
    </Modal>)}

  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<GymDump />);
</script>
</body>
</html>
